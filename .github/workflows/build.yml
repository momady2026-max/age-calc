name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Force Tailwind Native Binding
        run: |
          npm install @tailwindcss/oxide-linux-x64-gnu --save-optional --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Install Capacitor & Configure Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps
          npx cap init "Age Calc" "com.momady.agecalc" --web-dir=dist --skip-appid-validation
          npx cap add android
          npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
